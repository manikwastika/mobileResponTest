<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Navbar Responsif</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <style>
      [x-cloak] {
        display: none !important;
      }
    </style>
  </head>

  <body class="h-full">
    <div class="w-full">
      <nav
        class="bg-blue-800 shadow-sm"
        x-data="{ toggleNavbar: false, togleBgNav: false }"
      >
        <div class="relative max-w-9/10 m-auto px-4 lg:max-w-3/4">
          <div class="flex items-center justify-between h-16">
            <div class="flex items-center">
              <div>
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="43"
                  height="33"
                  viewBox="0 0 53 43"
                  fill="none"
                  id="Logo"
                >
                  <g id="logogram">
                    <path
                      d="M37.5 27.0752C37.5 20.4478 32.1274 15.0752 25.5 15.0752H15.5V27.0752H25.5V42.0752H37.5V27.0752Z"
                      fill="#FF4D00"
                    ></path>
                    <path
                      d="M0.5 28.0752C0.500001 35.8072 6.76801 42.0752 14.5 42.0752H22.5V30.0752H14.5C13.3954 30.0752 12.5 29.1798 12.5 28.0752V27.0752H0.5V28.0752Z"
                      fill="#FF4D00"
                    ></path>
                    <path
                      d="M25.5 0.0751953C40.4117 0.0751953 52.5 12.1635 52.5 27.0752V42.0752H40.5V27.0752C40.5 18.7909 33.7843 12.0752 25.5 12.0752H14.5C13.3954 12.0752 12.5 12.9706 12.5 14.0752V15.0752H0.5V14.0752C0.500001 6.34321 6.76802 0.0751953 14.5 0.0751953H25.5Z"
                      fill="#FF4D00"
                    ></path>
                  </g>
                </svg>
              </div>
              <div class="hidden sm:block">
                <div class="flex items-center md:ml-10 sm:ml-5">
                  <div
                    class="text-sm md:space-x-2 lg:space-x-4 sm:space-x-0.5 text-blue-50"
                  >
                    <a href="" class="px-3 py-2 rounded-lg bg-white/40">Home</a>
                    <a
                      href=""
                      class="px-3 py-2 rounded-lg hover:bg-white/15 transition delay-100"
                      >Product</a
                    >
                    <a
                      href=""
                      class="px-3 py-2 rounded-lg hover:bg-white/15 transition delay-100"
                      >Order</a
                    >
                    <a
                      href=""
                      class="px-3 py-2 rounded-lg hover:bg-white/15 transition delay-100"
                      >History</a
                    >
                    <a
                      href=""
                      class="px-3 py-2 rounded-lg hover:bg-white/15 transition delay-100"
                      >Contact</a
                    >
                  </div>
                </div>
              </div>
            </div>
            <div
              class="text-3xl flex cursor-pointer sm:hidden"
              @click="toggleNavbar = !toggleNavbar"
            >
              <ion-icon class="text-white" name="menu-outline"></ion-icon>
            </div>
            <div class="hidden sm:block">
              <div
                class="w-10 cursor-pointer"
                @click="togleBgNav = !togleBgNav"
              >
                <img
                  src="./img/manik.jpg"
                  alt="Manik Wastika"
                  class="rounded-full"
                />
              </div>
            </div>
          </div>
          <div
            class="hidden sm:block"
            x-show="togleBgNav"
            x-cloak
            x-transition:enter="transition ease-in duration-200"
            x-transition:enter-start="opacity-0"
            x-transition:enter-end="opacity-100"
            x-transition:leave="opacity-100"
            x-transition:leave-start="opacity-0"
            x-transition:leave-end="transition ease-out duration-300"
          >
            <div class="absolute right-0 top-15 px-5">
              <div class="w-45 h-27 bg-white shadow-md rounded-lg">
                <a
                  href=""
                  class="flex items-center py-2 px-5 hover:bg-slate-200 hover:rounded-lg"
                  ><ion-icon name="person"></ion-icon
                  ><span class="ml-2 text-sm">Your Profile</span></a
                >
                <a
                  href=""
                  class="flex items-center py-2 px-5 hover:bg-slate-200 hover:rounded-lg"
                  ><ion-icon name="settings"></ion-icon
                  ><span class="ml-2 text-sm">Settings</span></a
                >
                <a
                  href=""
                  class="flex items-center py-2 px-5 hover:bg-slate-200 hover:rounded-lg text-red-500"
                  ><ion-icon name="log-out"></ion-icon
                  ><span class="ml-2 text-sm">Sign Out</span></a
                >
              </div>
            </div>
          </div>
        </div>

        <!-- {{-- Tampilan Model ManikWST --}} -->
        <div
          class="bg-blue-900 sm:hidden"
          x-show="toggleNavbar"
          x-cloak
          x-transition:enter="transition ease-out duration-300"
          x-transition:enter-start="opacity-0 -translate-y-3"
          x-transition:enter-end="opacity-100 translate-y-0"
          x-transition:leave="transition ease-out duration-200"
          x-transition:leave-start="opacity-100 translate-y-0"
          x-transition:leave-end="opacity-0 -translate-y-3"
        >
          <div class="text-white text-sm">
            <a href="/" class="flex items-center shadow-sm py-3 px-8"
              ><ion-icon name="home-outline" class="text-[1rem]"></ion-icon
              ><span class="ml-2">Home</span></a
            >
            <a href="/product" class="flex items-center shadow-sm py-3 px-8"
              ><ion-icon name="cart-outline" class="text-[1rem]"></ion-icon
              ><span class="ml-2">Product</span></a
            >
            <a href="" class="flex items-center shadow-sm py-3 px-8"
              ><ion-icon
                name="file-tray-full-outline"
                class="text-[1rem]"
              ></ion-icon
              ><span class="ml-2">Order</span></a
            >
            <a href="" class="flex items-center shadow-sm py-3 px-8"
              ><ion-icon name="receipt-outline" class="text-[1rem]"></ion-icon
              ><span class="ml-2">History</span></a
            >
            <a href="" class="flex items-center shadow-sm py-3 px-8"
              ><ion-icon
                name="paper-plane-outline"
                class="text-[1rem]"
              ></ion-icon
              ><span class="ml-2">Contact</span></a
            >
          </div>
          <div class="bg-blue-950 text-white">
            <div class="flex items-center px-8 py-5 shadow-sm">
              <img
                src="./img/manik.jpg"
                alt="Manik WST"
                class="w-10 h-10 rounded-full border-2 border-white"
              />
              <div class="ml-3">
                <h3 class="text-xs font-semibold">Manik Wastika</h3>
                <p class="text-xs font-light">komangmanikwastika@gmail.com</p>
              </div>
            </div>
            <div>
              <a href="" class="px-8 py-3 shadow-md text-sm flex items-center">
                <ion-icon
                  name="person-circle-outline"
                  class="text-[1.1rem]"
                ></ion-icon
                ><span class="ml-2">your Profile</span></a
              >
              <a href="" class="px-8 py-3 shadow-md text-sm flex items-center"
                ><ion-icon
                  name="settings-outline"
                  class="text-[1rem]"
                ></ion-icon
                ><span class="ml-2">Settings</span></a
              >
              <a href="" class="block px-8 py-3 shadow-md text-sm text-red-500"
                ><ion-icon name="log-out-outline" class="text-[1rem]"></ion-icon
                ><span class="ml-2">Sign Out</span></a
              >
            </div>
          </div>
        </div>
        <!-- {{-- End Mobile Manik --}} -->
      </nav>
    </div>

    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
  </body>
</html>
